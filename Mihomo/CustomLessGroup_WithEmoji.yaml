dns:
  enable: true
  enhanced-mode: redir-host
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.*"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  fallback:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  fallback-filter:
    geoip: false
  nameserver-policy:
    "geosite:private":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"
    "geosite:cn":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"
    "rule-set:china-max":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"

proxy-groups:
  - name: 🔰 节点选择
    type: select
    include-all: true
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  - name: ֎ OpenAI
    include-all: true
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
    type: select
  - name: 📶 直接连接
    type: select
    proxies:
      - DIRECT
  - name: ⛔️ 禁止连接
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🔍 默认兜底
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT
rule-providers:
  lan:
    url: https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
    path: ./ruleset/LocalAreaNetwork.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  force-direct:
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceDirect.list"
    path: ./ruleset/force-direct.list
    interval: 86400
    type: http
    behavior: classical
    format: text
  cn-cidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Loyalsoldier/geoip@release/clash/ipcidr/cn.txt"
    path: ./ruleset/ipcidr/cn.yaml
    interval: 86400
  china-max:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Accademia/Additional_Rule_For_Clash@master/ChinaMax/ChinaMax_Domain.yaml"
    path: ./ruleset/china-max.yaml
    interval: 86400
  openai:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml"
    path: ./ruleset/openai.yaml
    interval: 86400

rules:
  - "RULE-SET, lan, 📶 直接连接"
  - "RULE-SET, cn-cidr, 📶 直接连接"
  - "RULE-SET, china-max, 📶 直接连接"
  - "GEOSITE, CN, 📶 直接连接"
  - "GEOIP, CN, 📶 直接连接"
  - "RULE-SET, force-direct, 📶 直接连接"
  - "DOMAIN-SUFFIX, adobe.io, REJECT"
  - "DOMAIN-SUFFIX, *.adobe.io, REJECT"
  - "DOMAIN-SUFFIX, adobestats.io, REJECT"
  - "DOMAIN-SUFFIX, photo-api.adobe.io, DIRECT"
  - "DOMAIN-KEYWORD, adobe, DIRECT"
  - "RULE-SET, openai, ֎ OpenAI"
  - "MATCH, 🔍 默认兜底"
