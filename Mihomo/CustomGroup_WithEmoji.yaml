dns:
  enable: true
  enhanced-mode: redir-host
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "stun.l.google.com"
    - "lens.l.google.com"
    - "localhost.ptlogin2.qq.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  fallback:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  fallback-filter:
    geoip: false
  nameserver-policy:
    "geosite:private":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"
    "geosite:cn":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"
    "rule-set:china-max":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"

proxy-groups:
  # === 核心链式代理 ===
  - name: ✈️ 前置代理
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    exclude-filter: "(?i)落地|自建|家宽|家庭"

  - name: 🏠 落地节点
    type: select
    include-all: true
    filter: "(?i)落地|自建|家宽|家庭"
    dialer-proxy: "✈️ 前置代理"

  - name: 🇭🇰 香港落地
    type: select
    include-all: true
    filter: "(?i)🇭🇰|香港|HK|Hong Kong"

  - name: 🇯🇵 日本落地
    type: select
    include-all: true
    filter: "(?i)🇯🇵|日本|JP|Tokyo"
    # dialer-proxy: "✈️ 前置代理"   # 如果你日本节点也是自建或想走链路就加上

  - name: 🇺🇸 美国落地
    type: select
    include-all: true
    filter: "(?i)🇺🇸|美国|US|United States"

  # 应用类策略组（推荐优先使用落地节点）
  - name: 🎵 Spotify
    type: select
    proxies:
      - 🏠 落地节点
      - 🇭🇰 香港落地
      - 🇯🇵 日本落地
      - 🇺🇸 美国落地

  - name: ֎ OpenAI
    type: select
    proxies:
      - 🏠 落地节点
      - 🇭🇰 香港落地
      - 🇯🇵 日本落地
      - 🇺🇸 美国落地

  - name: ⚎ Gemini
    type: select
    proxies:
      - 🏠 落地节点
      - 🇭🇰 香港落地
      - 🇯🇵 日本落地
      - 🇺🇸 美国落地

  - name: 🎓 谷歌学术
    type: select
    proxies:
      - 🏠 落地节点

  # 兜底组
  - name: 📶 直接连接
    type: select
    proxies: [DIRECT]

  - name: 🔍 默认兜底
    type: select
    proxies:
      - 🏠 落地节点
      - 📶 直接连接

  - name: ⛔️ 禁止连接
    type: select
    proxies: [REJECT, 📶 直接连接]

rule-providers:
  lan:
    url: https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
    path: ./ruleset/LocalAreaNetwork.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  cn-cidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/ipcidr/cn.yaml
    interval: 86400
  china-max:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Accademia/Additional_Rule_For_Clash@master/ChinaMax/ChinaMax_Domain.yaml"
    path: ./ruleset/china-max.yaml
    interval: 86400
  force-direct:
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceDirect.list"
    path: ./ruleset/force-direct.list
    interval: 86400
    type: http
    behavior: classical
    format: text
  force-proxy:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceProxy.list"
    path: ./ruleset/force-proxy.list
    interval: 86400
  force-jp:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceJP.list"
    path: ./ruleset/force-jp.list
    interval: 86400
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
  spotify:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Spotify/Spotify.yaml"
    path: ./ruleset/spotify.yaml
    interval: 86400
  openai:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml"
    path: ./ruleset/openai.yaml
    interval: 86400
  gemini:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.yaml"
    path: ./ruleset/gemini.yaml
    interval: 86400

rules:
  # 强制直连
  - "RULE-SET, force-direct, DIRECT"

  # 国内流量直连
  - "RULE-SET, lan, DIRECT"
  - "RULE-SET, cn-cidr, DIRECT"
  - "RULE-SET, china-max, DIRECT"
  - "GEOSITE, CN, DIRECT"
  - "GEOIP, CN, DIRECT"

  # 广告拦截
  - "RULE-SET, reject, ⛔️ 禁止连接"

  - "DOMAIN-SUFFIX, adobe.io, REJECT"
  - "DOMAIN-SUFFIX, *.adobe.io, REJECT"
  - "DOMAIN-SUFFIX, adobestats.io, REJECT"
  - "DOMAIN-SUFFIX, photo-api.adobe.io, DIRECT"
  - "DOMAIN-KEYWORD, adobe, DIRECT"

  # 业务规则
  - "RULE-SET, force-jp, 🇯🇵 日本落地"
  - "DOMAIN-SUFFIX, gov, 🇺🇸 美国落地"
  - "DOMAIN-SUFFIX, mil, 🇺🇸 美国落地"
  - "RULE-SET, spotify, 🎵 Spotify"
  - "RULE-SET, openai, ֎ OpenAI"
  - "RULE-SET, gemini, ⚎ Gemini"
  - "DOMAIN, scholar.google.com, 🎓 谷歌学术"
  - "RULE-SET, force-proxy, ✈️ 前置代理"

  # 兜底
  - "MATCH, 🔍 默认兜底"
