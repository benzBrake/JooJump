dns:
  enable: true
  enhanced-mode: redir-host
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "stun.l.google.com"
    - "lens.l.google.com"
    - "localhost.ptlogin2.qq.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  fallback:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  fallback-filter:
    geoip: false
  nameserver-policy:
    "geosite:private":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"
    "geosite:cn":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"
    "rule-set:china-max":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"

proxy-groups:
  - name: 🚀 机场自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    exclude-filter: "(?i)落地|自建"

  - name: 🚀 机场节点
    type: select
    proxies:
      - 🚀 机场自动
    include-all: true
    exclude-filter: "(?i)落地|自建"

  - name: 🏠 自建自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(?i)落地|自建"

  - name: 🏠 自建节点
    type: select
    proxies:
      - 🏠 自建自动
    include-all: true
    filter: "(?i)落地|自建"

  - name: 🇭🇰 香港自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(?i)🇭🇰|香港|HK|Hong Kong"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇭🇰 香港节点
    type: select
    proxies:
      - 🇭🇰 香港自动
    include-all: true
    filter: "(?i)🇭🇰|香港|HK|Hong Kong"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇯🇵 日本自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(?i)🇯🇵|日本|JP|Tokyo"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇯🇵 日本节点
    type: select
    proxies:
      - 🇯🇵 日本自动
    include-all: true
    filter: "(?i)🇯🇵|日本|JP|Tokyo"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇺🇸 美国自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(?i)🇺🇸|美国|US|United States"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇺🇸 美国节点
    type: select
    proxies:
      - 🇺🇸 美国自动
    include-all: true
    filter: "(?i)🇺🇸|美国|US|United States"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇸🇬 狮城自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(?i)🇸🇬|新加坡|SG|Singapore"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇸🇬 狮城节点
    type: select
    proxies:
      - 🇸🇬 狮城自动
    include-all: true
    filter: "(?i)🇸🇬|新加坡|SG|Singapore"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇦🇺 澳洲自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(?i)🇦🇺|澳大利亚|澳洲|AU|Australia"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🇦🇺 澳洲节点
    type: select
    proxies:
      - 🇦🇺 澳洲自动
    include-all: true
    filter: "(?i)🇦🇺|澳大利亚|澳洲|AU|Australia"
    exclude-filter: "(?i).*落地.*|.*自建.*"

  - name: 🎵 Spotify
    type: select
    proxies:
      - 🚀 机场节点
      - 🏠 自建节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇦🇺 澳洲节点

  - name: ֎ OpenAI
    type: select
    proxies:
      - 🚀 机场节点
      - 🏠 自建节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇦🇺 澳洲节点

  - name: ⚎ Gemini
    type: select
    proxies:
      - 🚀 机场节点
      - 🏠 自建节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇦🇺 澳洲节点

  - name: 🔍 默认兜底
    type: select
    proxies:
      - 🚀 机场节点
      - 🏠 自建节点
      - DIRECT

  - name: ⛔️ 禁止连接
    type: select
    proxies: [REJECT, DIRECT]

rule-providers:
  lan:
    url: https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
    path: ./ruleset/LocalAreaNetwork.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  cn-cidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/ipcidr/cn.yaml
    interval: 86400
  china-max:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Accademia/Additional_Rule_For_Clash@master/ChinaMax/ChinaMax_Domain.yaml"
    path: ./ruleset/china-max.yaml
    interval: 86400
  force-direct:
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceDirect.list"
    path: ./ruleset/force-direct.list
    interval: 86400
    type: http
    behavior: classical
    format: text
  force-proxy:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceProxy.list"
    path: ./ruleset/force-proxy.list
    interval: 86400
  force-jp:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceJP.list"
    path: ./ruleset/force-jp.list
    interval: 86400
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
  spotify:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Spotify/Spotify.yaml"
    path: ./ruleset/spotify.yaml
    interval: 86400
  openai:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml"
    path: ./ruleset/openai.yaml
    interval: 86400
  gemini:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.yaml"
    path: ./ruleset/gemini.yaml
    interval: 86400

rules:
  # 强制直连
  - "RULE-SET, force-direct, DIRECT"

  # 国内流量直连
  - "RULE-SET, lan, DIRECT"
  - "RULE-SET, cn-cidr, DIRECT"
  - "RULE-SET, china-max, DIRECT"
  - "GEOSITE, CN, DIRECT"
  - "GEOIP, CN, DIRECT"

  # 广告拦截
  - "RULE-SET, reject, ⛔️ 禁止连接"

  - "DOMAIN-SUFFIX, adobe.io, REJECT"
  - "DOMAIN-SUFFIX, *.adobe.io, REJECT"
  - "DOMAIN-SUFFIX, adobestats.io, REJECT"
  - "DOMAIN-SUFFIX, photo-api.adobe.io, DIRECT"
  - "DOMAIN-KEYWORD, adobe, DIRECT"

  # GITHUB 规则
  - "AND,((DOMAIN-SUFFIX,github.com),(DST-PORT,22)),🏠 自建节点"

  # 业务规则
  - "RULE-SET, force-jp, 🇯🇵 日本节点"
  - "DOMAIN-SUFFIX, gov, 🇺🇸 美国节点"
  - "DOMAIN-SUFFIX, mil, 🇺🇸 美国节点"
  - "RULE-SET, spotify, 🎵 Spotify"
  - "RULE-SET, openai, ֎ OpenAI"
  - "RULE-SET, gemini, ⚎ Gemini"
  - "RULE-SET, force-proxy, 🔍 默认兜底"

  # 兜底
  - "MATCH, 🔍 默认兜底"
