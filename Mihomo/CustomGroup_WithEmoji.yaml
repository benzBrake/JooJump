proxy-groups:
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true

  - name: 📶 直接连接
    type: select
    proxies:
      - DIRECT

  - name: 🔰 节点选择
    type: select
    include-all: true
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
    proxies:
      - 📶 直接连接

  - name: 🇯🇵 日本落地
    type: select
    include-all: true
    filter: "(?i)🇯🇵|日本|JP|Tokyo"

  - name: 🇺🇸 美国落地
    type: select
    include-all: true
    filter: "(?i)🇺🇸|美国|US|United States"

  - name: 🎵 Spotify
    type: select
    include-all: true
    proxies:
      - ♻️ 自动选择
      - DIRECT

  - name: ֎ OpenAI
    include-all: true
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
    type: select

  - name: ⚎ Gemini
    type: select
    include-all: true
    proxies:
      - ♻️ 自动选择

  - name: 🎓 谷歌学术
    type: select
    include-all: true
    proxies:
      - ♻️ 自动选择

  - name: "🌐 IPv6专用"
    type: select
    include-all: true
    proxies:
      - ♻️ 自动选择
      - 🔰 节点选择
      - 📶 直接连接

  - name: ⛔️ 禁止连接
    type: select
    proxies:
      - REJECT
      - 📶 直接连接

  - name: 🔍 默认兜底
    type: select
    use:
      - all-proxies
    proxies:
      - ♻️ 自动选择
      - 🔰 节点选择
      - 📶 直接连接
rule-providers:
  lan:
    url: https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
    path: ./ruleset/LocalAreaNetwork.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  cn-cidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdmirror.com/gh/Loyalsoldier/geoip@release/clash/ipcidr/cn.txt"
    path: ./ruleset/ipcidr/cn.yaml
    interval: 86400
  force-direct:
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceDirect.list"
    path: ./ruleset/force-direct.list
    interval: 86400
    type: http
    behavior: classical
    format: text
  force-proxy:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceProxy.list"
    path: ./ruleset/force-proxy.list
    interval: 86400
  force-jp:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdmirror.com/gh/benzBrake/JooJump@master/Clash/ForceJP.list"
    path: ./ruleset/force-jp.list
    interval: 86400
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
  spotify:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Spotify/Spotify.yaml"
    path: ./ruleset/spotify.yaml
    interval: 86400
  openai:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml"
    path: ./ruleset/openai.yaml
    interval: 86400
  gemini:
    type: http
    behavior: classical
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.yaml"
    path: ./ruleset/gemini.yaml
    interval: 86400

rules:
  # 直连
  - "RULE-SET, lan, DIRECT"
  - "RULE-SET,cn-cidr,DIRECT"
  - "GEOSITE,CN,DIRECT"
  - "GEOIP,CN,DIRECT"
  - "RULE-SET, force-direct, DIRECT"
  - "DOMAIN-SUFFIX,adobe.io,REJECT"
  - "DOMAIN-SUFFIX,*.adobe.io,REJECT"
  - "DOMAIN-SUFFIX,adobestats.io,REJECT"
  - "DOMAIN-SUFFIX,photo-api.adobe.io,DIRECT"
  - "DOMAIN-KEYWORD,adobe,DIRECT"
  - "RULE-SET, reject, ⛔️ 禁止连接"
  # 代理
  - "RULE-SET, force-jp, 🇯🇵 日本落地"
  - "DOMAIN-SUFFIX,gov,🇺🇸 美国落地"
  - "DOMAIN-SUFFIX,mil,🇺🇸 美国落地"
  - "RULE-SET, spotify, 🎵 Spotify"
  - "RULE-SET, openai, ֎ OpenAI"
  - "RULE-SET, gemini, ⚎ Gemini"
  - "DOMAIN,scholar.google.com,🎓 谷歌学术"
  # IPV6
  - IP-CIDR6,::/0,🌐 IPv6专用,no-resolve
  - IP-CIDR6,2000::/3,🌐 IPv6专用
  # 兜底
  - "MATCH, 🔍 默认兜底"
