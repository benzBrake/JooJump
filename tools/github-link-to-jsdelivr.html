<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub to jsDelivr Link Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        textarea {
            height: 200px;
            resize: vertical;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .mirror-select, .lang-select {
            margin: 10px 0;
        }
        .button-group {
            display: flex;
            justify-content: center;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #f1f1f1;
            border: 1px solid #ccc;
            border-bottom: none;
            margin-bottom: -1px;
        }
        .tab.active {
            background-color: white;
            border-bottom: 1px solid white;
            margin-bottom: -1px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .lang-selector {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .lang-selector select {
            width: auto;
            margin: 0;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div class="lang-selector">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <h2 data-i18n="title">GitHub to jsDelivr Link Converter</h2>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('single')" data-i18n="tabSingle">Single Link</div>
            <div class="tab" onclick="switchTab('batch')" data-i18n="tabBatch">Batch Processing</div>
        </div>

        <div id="single" class="tab-content active">
            <label for="githubUrl" data-i18n="labelInput">Enter GitHub Link:</label>
            <input type="text" id="githubUrl" data-i18n-placeholder="placeholderInput">

            <div class="mirror-select">
                <label for="mirror" data-i18n="labelMirror">Select Mirror Site:</label>
                <select id="mirror">
                    <option value="https://cdn.jsdelivr.net" data-i18n="mirrorJsdelivr">jsDelivr (Global Default)</option>
                    <option value="https://cdn.jsdmirror.com" data-i18n="mirrorJsdm">jsDelivr Mirror (China Optimized)</option>
                </select>
            </div>

            <label for="jsDelivrUrl" data-i18n="labelOutput">Converted Link:</label>
            <textarea id="jsDelivrUrl" readonly data-i18n-placeholder="placeholderOutput" style="height: 100px;"></textarea>

            <div class="button-group">
                <button onclick="copyToClipboard('jsDelivrUrl')" data-i18n="btnCopy">Copy Link</button>
            </div>
        </div>

        <div id="batch" class="tab-content">
            <label for="batchInput" data-i18n="labelBatchInput">Enter Text with GitHub Links:</label>
            <textarea id="batchInput" data-i18n-placeholder="placeholderBatchInput"></textarea>

            <div class="mirror-select">
                <label for="mirrorBatch" data-i18n="labelMirror">Select Mirror Site:</label>
                <select id="mirrorBatch">
                    <option value="https://cdn.jsdelivr.net" data-i18n="mirrorJsdelivr">jsDelivr (Global Default)</option>
                    <option value="https://cdn.jsdmirror.com" data-i18n="mirrorJsdm">jsDelivr Mirror (China Optimized)</option>
                </select>
            </div>

            <label for="batchOutput" data-i18n="labelBatchOutput">Converted Text:</label>
            <textarea id="batchOutput" readonly data-i18n-placeholder="placeholderBatchOutput"></textarea>

            <div class="button-group">
                <button onclick="convertBatch()" data-i18n="btnConvert">Convert</button>
                <button onclick="copyToClipboard('batchOutput')" data-i18n="btnCopyText">Copy Text</button>
            </div>
        </div>
    </div>

    <script>
        // Language pack
        const translations = {
            'en': {
                title: 'GitHub to jsDelivr Link Converter',
                tabSingle: 'Single Link',
                tabBatch: 'Batch Processing',
                labelInput: 'Enter GitHub Link:',
                placeholderInput: 'e.g., https://github.com/user/repo/blob/main/file.js or https://raw.githubusercontent.com/user/repo/main/file.js',
                labelMirror: 'Select Mirror Site:',
                mirrorJsdelivr: 'jsDelivr (Global Default)',
                mirrorJsdm: 'jsDelivr Mirror (China Optimized)',
                labelOutput: 'Converted Link:',
                placeholderOutput: 'The converted link will be displayed here',
                btnCopy: 'Copy Link',
                labelBatchInput: 'Enter Text with GitHub Links:',
                placeholderBatchInput: 'Paste text containing GitHub links here. All links will be converted.',
                labelBatchOutput: 'Converted Text:',
                placeholderBatchOutput: 'The text with converted links will be displayed here.',
                btnConvert: 'Convert',
                btnCopyText: 'Copy Text',
                alertEmptyLink: 'Please enter a valid GitHub link!',
                alertInvalidLink: 'Please enter a valid GitHub or CDN link!',
                alertInvalidBlob: 'Invalid link format. Please ensure it is a GitHub file blob link!',
                alertInvalidRaw: 'Invalid link format. Please ensure it is a GitHub file raw link!',
                alertInvalidFormat: 'Invalid link format. Only GitHub blob, raw, jsDelivr, or jsdmirror links are supported!',
                alertInvalidJsdelivr: 'Invalid link format. Please ensure it is a valid jsDelivr link!',
                alertInvalidJsdm: 'Invalid link format. Please ensure it is a valid jsdmirror link!',
                alertSameMirror: 'Input is already a {mirror} link. Please select a different mirror to convert.',
                alertConversionFailed: 'Conversion failed. Please check the link format!',
                alertEmptyBatch: 'Please enter text containing GitHub links!',
                alertCopied: 'Content copied to clipboard!',
                alertCopyFailed: 'Failed to copy content: ',
                alertNoValidContent: 'No valid content to copy!'
            },
            'zh-CN': {
                title: 'GitHub 转 jsDelivr 链接转换器',
                tabSingle: '单链接转换',
                tabBatch: '批量处理',
                labelInput: '输入 GitHub 链接：',
                placeholderInput: '例如：https://github.com/user/repo/blob/main/file.js 或 https://raw.githubusercontent.com/user/repo/main/file.js',
                labelMirror: '选择镜像站点：',
                mirrorJsdelivr: 'jsDelivr (全球默认)',
                mirrorJsdm: 'jsDelivr 镜像 (国内优化)',
                labelOutput: '转换后链接：',
                placeholderOutput: '转换后的链接将显示在这里',
                btnCopy: '复制链接',
                labelBatchInput: '输入包含 GitHub 链接的文本：',
                placeholderBatchInput: '在此粘贴包含 GitHub 链接的文本，所有链接将被转换。',
                labelBatchOutput: '转换后文本：',
                placeholderBatchOutput: '转换后的文本将显示在这里。',
                btnConvert: '转换',
                btnCopyText: '复制文本',
                alertEmptyLink: '请输入有效的 GitHub 链接！',
                alertInvalidLink: '请输入有效的 GitHub 或 CDN 链接！',
                alertInvalidBlob: '链接格式无效。请确保是 GitHub 文件 blob 链接！',
                alertInvalidRaw: '链接格式无效。请确保是 GitHub 文件 raw 链接！',
                alertInvalidFormat: '链接格式无效。仅支持 GitHub blob、raw、jsDelivr 或 jsdmirror 链接！',
                alertInvalidJsdelivr: '链接格式无效。请确保是有效的 jsDelivr 链接！',
                alertInvalidJsdm: '链接格式无效。请确保是有效的 jsdmirror 链接！',
                alertSameMirror: '输入已经是 {mirror} 链接。请选择其他镜像进行转换。',
                alertConversionFailed: '转换失败。请检查链接格式！',
                alertEmptyBatch: '请输入包含 GitHub 链接的文本！',
                alertCopied: '内容已复制到剪贴板！',
                alertCopyFailed: '复制失败：',
                alertNoValidContent: '没有有效内容可复制！'
            },
            'zh-TW': {
                title: 'GitHub 转 jsDelivr 連結轉換器',
                tabSingle: '單連結轉換',
                tabBatch: '批次處理',
                labelInput: '輸入 GitHub 連結：',
                placeholderInput: '例如：https://github.com/user/repo/blob/main/file.js 或 https://raw.githubusercontent.com/user/repo/main/file.js',
                labelMirror: '選擇鏡像站點：',
                mirrorJsdelivr: 'jsDelivr (全球預設)',
                mirrorJsdm: 'jsDelivr 鏡像 (國內優化)',
                labelOutput: '轉換後連結：',
                placeholderOutput: '轉換後的連結將顯示在這裡',
                btnCopy: '複製連結',
                labelBatchInput: '輸入包含 GitHub 連結的文本：',
                placeholderBatchInput: '在此貼上包含 GitHub 連結的文本，所有連結將被轉換。',
                labelBatchOutput: '轉換後文本：',
                placeholderBatchOutput: '轉換後的文本將顯示在這裡。',
                btnConvert: '轉換',
                btnCopyText: '複製文本',
                alertEmptyLink: '請輸入有效的 GitHub 連結！',
                alertInvalidLink: '請輸入有效的 GitHub 或 CDN 連結！',
                alertInvalidBlob: '連結格式無效。請確保是 GitHub 文件 blob 連結！',
                alertInvalidRaw: '連結格式無效。請確保是 GitHub 文件 raw 連結！',
                alertInvalidFormat: '連結格式無效。僅支援 GitHub blob、raw、jsDelivr 或 jsdmirror 連結！',
                alertInvalidJsdelivr: '連結格式無效。請確保是有效的 jsDelivr 連結！',
                alertInvalidJsdm: '連結格式無效。請確保是有效的 jsdmirror 連結！',
                alertSameMirror: '輸入已經是 {mirror} 連結。請選擇其他鏡像進行轉換。',
                alertConversionFailed: '轉換失敗。請檢查連結格式！',
                alertEmptyBatch: '請輸入包含 GitHub 連結的文本！',
                alertCopied: '內容已複製到剪貼板！',
                alertCopyFailed: '複製失敗：',
                alertNoValidContent: '沒有有效內容可複製！'
            },
            'ja': {
                title: 'GitHub から jsDelivr へのリンク変換ツール',
                tabSingle: '単一リンク',
                tabBatch: '一括処理',
                labelInput: 'GitHubリンクを入力：',
                placeholderInput: '例: https://github.com/user/repo/blob/main/file.js または https://raw.githubusercontent.com/user/repo/main/file.js',
                labelMirror: 'ミラーサイトを選択：',
                mirrorJsdelivr: 'jsDelivr (グローバル標準)',
                mirrorJsdm: 'jsDelivr ミラー (中国向け最適化)',
                labelOutput: '変換後のリンク：',
                placeholderOutput: '変換されたリンクがここに表示されます',
                btnCopy: 'リンクをコピー',
                labelBatchInput: 'GitHubリンクを含むテキストを入力：',
                placeholderBatchInput: 'GitHubリンクを含むテキストをここに貼り付けます。すべてのリンクが変換されます。',
                labelBatchOutput: '変換後のテキスト：',
                placeholderBatchOutput: '変換されたテキストがここに表示されます。',
                btnConvert: '変換',
                btnCopyText: 'テキストをコピー',
                alertEmptyLink: '有効なGitHubリンクを入力してください！',
                alertInvalidLink: '有効なGitHubまたはCDNリンクを入力してください！',
                alertInvalidBlob: 'リンク形式が無効です。GitHubファイルのblobリンクであることを確認してください！',
                alertInvalidRaw: 'リンク形式が無効です。GitHubファイルのrawリンクであることを確認してください！',
                alertInvalidFormat: 'リンク形式が無効です。GitHubのblob、raw、jsDelivr、またはjsdmirrorリンクのみサポートされています！',
                alertInvalidJsdelivr: 'リンク形式が無効です。有効なjsDelivrリンクであることを確認してください！',
                alertInvalidJsdm: 'リンク形式が無効です。有効なjsdmirrorリンクであることを確認してください！',
                alertSameMirror: '入力は既に{mirror}リンクです。変換するには別のミラーを選択してください。',
                alertConversionFailed: '変換に失敗しました。リンク形式を確認してください！',
                alertEmptyBatch: 'GitHubリンクを含むテキストを入力してください！',
                alertCopied: 'コンテンツがクリップボードにコピーされました！',
                alertCopyFailed: 'コピーに失敗しました：',
                alertNoValidContent: 'コピーする有効なコンテンツがありません！'
            }
        };

        // Current language
        let currentLang = 'en';

        // Detect language and set default
        function detectLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            const langMap = {
                'zh-CN': 'zh-CN',
                'zh-TW': 'zh-TW',
                'zh-HK': 'zh-TW',
                'ja': 'ja',
                'ja-JP': 'ja'
            };
            return langMap[userLang] || 'en';
        }

        // Change language
        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];

            // Update all elements with data-i18n attribute
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });

            // Update all placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) {
                    el.placeholder = t[key];
                }
            });

            // Update select options
            document.querySelectorAll('#mirror option, #mirrorBatch option').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
        }

        // Get translated text
        function t(key, params = {}) {
            let text = translations[currentLang][key] || translations['en'][key] || key;
            if (params.mirror) {
                const mirrorNames = {
                    'https://cdn.jsdelivr.net': translations[currentLang].mirrorJsdelivr,
                    'https://cdn.jsdmirror.com': translations[currentLang].mirrorJsdm
                };
                text = text.replace('{mirror}', mirrorNames[params.mirror] || params.mirror);
            }
            return text;
        }

        // Initialize
        const userLang = detectLanguage();
        document.getElementById('langSelect').value = userLang;
        changeLanguage(userLang);

        // Detect language and set default mirror
        const mirrorSelect = document.getElementById('mirror');
        const mirrorBatchSelect = document.getElementById('mirrorBatch');
        if (userLang === 'zh-CN' || userLang === 'zh-TW' || userLang.startsWith('zh')) {
            mirrorSelect.value = 'https://cdn.jsdmirror.com';
            mirrorBatchSelect.value = 'https://cdn.jsdmirror.com';
        }

        // Single link conversion elements
        const githubUrlInput = document.getElementById('githubUrl');
        const jsDelivrUrl = document.getElementById('jsDelivrUrl');

        // Add input event listener for automatic conversion in single link mode
        githubUrlInput.addEventListener('input', convertToJsDelivr);
        mirrorSelect.addEventListener('change', convertToJsDelivr);

        // Tab switching
        function switchTab(tabId) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Single link conversion
        function convertToJsDelivr() {
            const githubUrl = githubUrlInput.value.trim();
            const mirrorBase = mirrorSelect.value;

            if (!githubUrl) {
                jsDelivrUrl.value = t('alertEmptyLink');
                return;
            }

            if (!githubUrl.includes('github.com') && !githubUrl.includes('raw.githubusercontent.com') && !githubUrl.includes('cdn.jsdelivr.net') && !githubUrl.includes('cdn.jsdmirror.com')) {
                jsDelivrUrl.value = t('alertInvalidLink');
                return;
            }

            try {
                let user, repo, branch, filePath;
                let inputCdnBase = null;

                if (githubUrl.includes('github.com') && githubUrl.includes('blob')) {
                    const match = githubUrl.match(/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/);
                    if (!match) {
                        jsDelivrUrl.value = t('alertInvalidBlob');
                        return;
                    }
                    [, user, repo, branch, filePath] = match;
                } else if (githubUrl.includes('github.com') && githubUrl.includes('raw')) {
                    const match = githubUrl.match(/github\.com\/([^/]+)\/([^/]+)\/raw\/([^/]+)\/(.+)/);
                    if (!match) {
                        jsDelivrUrl.value = t('alertInvalidRaw');
                        return;
                    }
                    [, user, repo, branch, filePath] = match;
                } else if (githubUrl.includes('raw.githubusercontent.com')) {
                    const match = githubUrl.match(/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)/);
                    if (!match) {
                        jsDelivrUrl.value = t('alertInvalidRaw');
                        return;
                    }
                    [, user, repo, branch, filePath] = match;
                    if (branch.includes('refs/heads/')) {
                        branch = branch.replace('refs/heads/', '');
                    }
                } else if (githubUrl.includes('cdn.jsdelivr.net') && githubUrl.includes('gh/')) {
                    const match = githubUrl.match(/cdn\.jsdelivr\.net\/gh\/([^/]+)\/([^@]+)@([^/]+)\/(.+)/);
                    if (!match) {
                        jsDelivrUrl.value = t('alertInvalidJsdelivr');
                        return;
                    }
                    [, user, repo, branch, filePath] = match;
                    inputCdnBase = 'https://cdn.jsdelivr.net';
                } else if (githubUrl.includes('cdn.jsdmirror.com') && githubUrl.includes('gh/')) {
                    const match = githubUrl.match(/cdn\.jsdmirror\.com\/gh\/([^/]+)\/([^@]+)@([^/]+)\/(.+)/);
                    if (!match) {
                        jsDelivrUrl.value = t('alertInvalidJsdm');
                        return;
                    }
                    [, user, repo, branch, filePath] = match;
                    inputCdnBase = 'https://cdn.jsdmirror.com';
                } else {
                    jsDelivrUrl.value = t('alertInvalidFormat');
                    return;
                }

                const convertedUrl = `${mirrorBase}/gh/${user}/${repo}@${branch}/${filePath}`;

                // 如果输入是 CDN 链接且选中的是相同的镜像，显示提示信息
                if (inputCdnBase && inputCdnBase === mirrorBase) {
                    jsDelivrUrl.value = t('alertSameMirror', { mirror: mirrorBase });
                } else {
                    jsDelivrUrl.value = convertedUrl;
                }
            } catch (error) {
                jsDelivrUrl.value = t('alertConversionFailed');
            }
        }

        // Batch conversion
        function convertBatch() {
            const batchInput = document.getElementById('batchInput').value;
            const mirrorBase = document.getElementById('mirrorBatch').value;
            const batchOutput = document.getElementById('batchOutput');

            if (!batchInput) {
                batchOutput.value = t('alertEmptyBatch');
                return;
            }

            // Regular expression to match GitHub and CDN links
            const githubRegex = /(https?:\/\/(?:github\.com\/[^/]+\/[^/]+\/(?:blob|raw)\/[^/]+\/.+|raw\.githubusercontent\.com\/[^/]+\/[^/]+\/[^/]+\/.+|cdn\.jsdelivr\.net\/gh\/[^/]+\/[^@]+@[^/]+\/.+|cdn\.jsdmirror\.com\/gh\/[^/]+\/[^@]+@[^/]+\/.+))/g;
            let result = batchInput;
            const matches = batchInput.match(githubRegex);

            if (matches) {
                matches.forEach(link => {
                    try {
                        let user, repo, branch, filePath;
                        let inputCdnBase = null;

                        if (link.includes('github.com') && link.includes('blob')) {
                            const match = link.match(/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/);
                            if (match) {
                                [, user, repo, branch, filePath] = match;
                            }
                        } else if (link.includes('github.com') && link.includes('raw')) {
                            const match = link.match(/github\.com\/([^/]+)\/([^/]+)\/raw\/([^/]+)\/(.+)/);
                            if (match) {
                                [, user, repo, branch, filePath] = match;
                            }
                        } else if (link.includes('raw.githubusercontent.com')) {
                            const match = link.match(/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)/);
                            if (match) {
                                [, user, repo, branch, filePath] = match;
                                if (branch.includes('refs/heads/')) {
                                    branch = branch.replace('refs/heads/', '');
                                }
                            }
                        } else if (link.includes('cdn.jsdelivr.net') && link.includes('gh/')) {
                            const match = link.match(/cdn\.jsdelivr\.net\/gh\/([^/]+)\/([^@]+)@([^/]+)\/(.+)/);
                            if (match) {
                                [, user, repo, branch, filePath] = match;
                                inputCdnBase = 'https://cdn.jsdelivr.net';
                            }
                        } else if (link.includes('cdn.jsdmirror.com') && link.includes('gh/')) {
                            const match = link.match(/cdn\.jsdmirror\.com\/gh\/([^/]+)\/([^@]+)@([^/]+)\/(.+)/);
                            if (match) {
                                [, user, repo, branch, filePath] = match;
                                inputCdnBase = 'https://cdn.jsdmirror.com';
                            }
                        }

                        // 只有当不是相同 CDN 到相同 CDN 的转换时才替换
                        if (user && repo && branch && filePath && !(inputCdnBase && inputCdnBase === mirrorBase)) {
                            const convertedUrl = `${mirrorBase}/gh/${user}/${repo}@${branch}/${filePath}`;
                            result = result.replace(link, convertedUrl);
                        }
                    } catch (error) {
                        // Skip conversion if there's an error
                    }
                });
            }

            batchOutput.value = result;
        }

        // Copy to clipboard
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const errorMessages = [
                t('alertEmptyLink'),
                t('alertInvalidLink'),
                t('alertInvalidBlob'),
                t('alertInvalidRaw'),
                t('alertInvalidFormat'),
                t('alertInvalidJsdelivr'),
                t('alertInvalidJsdm'),
                t('alertConversionFailed'),
                t('alertEmptyBatch')
            ];
            // 检查是否是错误消息或提示信息（不以 https:// 开头的）
            const isValidContent = element.value && (
                element.value.startsWith('https://') ||
                element.value.startsWith('http://')
            ) && !errorMessages.some(msg => element.value.startsWith(msg));
            if (isValidContent) {
                navigator.clipboard.writeText(element.value)
                    .then(() => {
                        alert(t('alertCopied'));
                    })
                    .catch(err => {
                        alert(t('alertCopyFailed') + err);
                    });
            } else {
                alert(t('alertNoValidContent'));
            }
        }
    </script>
</body>
</html>
